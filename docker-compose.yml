# Runs the Otari gateway (Mozilla.ai, Apache-2.0) — the "A" in GEAR.
# Image: https://hub.docker.com/r/mzdotai/otari
#
# Kept deliberately minimal (gateway only) so there are few moving parts.
# The gateway reaches your local model on the HOST via host.docker.internal.

services:
  gateway:
    # Pinned to a specific tag — Otari is v0 and ships breaking changes
    # frequently. Bump deliberately: check https://hub.docker.com/r/mzdotai/otari/tags
    # and verify the smoke test (`make quickstart`) still passes.
    image: mzdotai/otari:bde1b1f
    command: gateway serve --config /app/config.yml
    ports:
      - "8000:8000"
    volumes:
      # Rendered by `make config` from gateway/config.example.yml + your .env
      - ./gateway/config.yml:/app/config.yml:ro
      # Persists the gateway's SQLite DB (keys, users, budgets, traces) across
      # `make restart` / --force-recreate. Without this, every restart wipes
      # the bootstrap key and any state you've added via the API. Bind-mounted
      # (not a named volume) so the directory inherits host-friendly perms;
      # Otari runs as uid 1000 inside the container and named volumes mount
      # as root by default.
      - ./gateway/data:/app/data
    environment:
      # Point Otari's DB at the persistent directory above (default is in /app,
      # which is the container's writable layer and gets wiped on recreate).
      OTARI_DATABASE_URL: "sqlite:////app/data/otari-gateway.db"
    env_file:
      - .env
    extra_hosts:
      # Lets the gateway (in this container) reach Ollama (:11434) or a
      # llamafile (:8080) running on your host — works on Linux too.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# OPTIONAL: swap SQLite for PostgreSQL. If you want that, override
# OTARI_DATABASE_URL above (e.g. postgresql://gateway:gateway@db/gateway)
# and uncomment the db service below. The gear_moz_otari_data volume will
# go unused in that case — feel free to remove it.
#
#   db:
#     image: postgres:16
#     environment:
#       POSTGRES_USER: gateway
#       POSTGRES_PASSWORD: gateway
#       POSTGRES_DB: gateway
#     volumes:
#       - gear_moz_pgdata:/var/lib/postgresql/data
#     restart: unless-stopped
#
# Then add to the volumes: block above:
#   gear_moz_pgdata:
